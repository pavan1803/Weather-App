<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        /* ===== Reset ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== Body / Page fill ===== */
body {
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background:
        radial-gradient(circle at top, #1e293b, #020617);
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
}

/* ===== Navbar ===== */
nav {
    height: 60px;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2#weather {
    font-size: 1.4rem;
    font-weight: 500;
}

.link {
    color: #ffffff;
    text-decoration: none;
    letter-spacing: 0.5px;
}

/* ===== Main hero content ===== */
body > h2 {
    margin-top: 5rem;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 400;
    color: #cbd5f5;
}

body > h1 {
    margin-top: 1rem;
    text-align: center;
    font-size: 3rem;
    font-weight: 500;
    line-height: 1.2;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
}

/* Accent word */
span {
    color: #38bdf8;
}

/* ===== Call-to-action button ===== */
button#btn {
    margin: 3rem auto 0;
    padding: 0.9rem 2.2rem;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    box-shadow: 0 25px 60px rgba(99, 102, 241, 0.4);
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

button#btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 35px 90px rgba(99, 102, 241, 0.55);
}

a.check {
    text-decoration: none;
    color: #020617;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.4px;
}

/* ===== Remove image visually ===== */
img {
    display: none;
}

/* ===== Page balance (fills screen nicely) ===== */
body::after {
    content: "";
    flex: 1;
}

/* ===== Mobile adjustments ===== */
@media (max-width: 600px) {
    body > h1 {
        font-size: 2.1rem;
        padding: 0 1rem;
    }

    body > h2 {
        font-size: 1.2rem;
    }

    button#btn {
        padding: 0.8rem 1.8rem;
    }
}
    </style>
</head>
<body>

    <nav>
          <h2 id="weather"> <a class="link" href="./index.html">Weather</h2></a>
          
      
    </nav>
   
    <h2>Welcome To Weather App</h2>

    <h1>Get The Latest <span>Weather</span> Info Of Your City</h1>

    <button id="btn"  type="button" ><a class="check" href="./weather.html">Check Now</button></a>

    

    
    
</body>
</html>
</html>
