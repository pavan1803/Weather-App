<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Weather App</title>
    <style>
/* ===== Base reset ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: #e5e7eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
}

/* ===== Heading ===== */
h1 {
    font-size: 2.2rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 1.8rem;
}

/* ===== Input + Button ===== */
input {
    width: 100%;
    max-width: 320px;
    padding: 0.9rem 1rem;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 1rem;
    background: #0f172a;
    color: #e5e7eb;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

input::placeholder {
    color: #94a3b8;
}

button {
    margin-top: 0.8rem;
    padding: 0.7rem 1.4rem;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: #020617;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.35);
}

/* ===== Output container ===== */
#output {
    width: 100%;
    max-width: 900px;
    margin-top: 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.8rem;
}

/* ===== Weather Card (ANCHOR ELEMENT) ===== */
.weather-result {
    position: relative;
    padding: 1.8rem 1.6rem;
    border-radius: 20px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(14px);
    box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.55),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    overflow: hidden;
}

/* subtle glow */
.weather-result::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
        circle at top left,
        rgba(56, 189, 248, 0.15),
        transparent 60%
    );
    opacity: 0;
    transition: opacity 0.35s ease;
}

.weather-result:hover {
    transform: translateY(-6px) scale(1.015);
    box-shadow:
        0 40px 90px rgba(0, 0, 0, 0.65),
        inset 0 0 0 1px rgba(255,255,255,0.12);
}

.weather-result:hover::before {
    opacity: 1;
}

/* ===== Card content ===== */
.weather-result h2 {
    font-size: 1.4rem;
    font-weight: 500;
    margin-bottom: 0.8rem;
    letter-spacing: 0.4px;
}

.weather-result p {
    font-size: 0.95rem;
    margin: 0.35rem 0;
    color: #cbd5f5;
}

.weather-result strong {
    font-weight: 500;
    color: #e0e7ff;
}

/* ===== Error message ===== */
.error {
    text-align: center;
    font-size: 1rem;
    color: #f87171;
    margin-top: 1rem;
}

/* ===== Mobile adjustments ===== */
@media (max-width: 480px) {
    h1 {
        font-size: 1.8rem;
    }

    .weather-result {
        padding: 1.4rem 1.3rem;
    }

    .weather-result h2 {
        font-size: 1.25rem;
    }
}
    </style>
</head>
<body>

    <h1>Weather App</h1>
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button id="searchBtn">Get Weather</button>

    <div id="output"></div>

        <script>
    const searchBtn = document.getElementById("searchBtn");
    const cityInput = document.getElementById("cityInput");
    const outputDiv = document.getElementById("output");

    const apiKey = "78e4473b6f20eae7cb91e1b7a5a37c00";

    // Array to store past search results
    let recentSearches = [];

    searchBtn.addEventListener("click", () => {
        const city = cityInput.value.trim();
        if (!city) {
            showError("Please enter a city name!");
            return;
        }
        fetchWeather(city);
    });

    function fetchWeather(city) {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error("City not found");
                }
                return response.json();
            })
            .then(data => {
                addToRecent(data);  // Save search
                showRecent();       // Show all results
            })
            .catch(error => {
                showError(error.message);
            });
    }

    function addToRecent(data) {
        const { name, main, weather } = data;
        const temp = main.temp.toFixed(1);
        const desc = weather[0].description;

        // Put newest search at the beginning
        recentSearches.unshift({ name, temp, desc });

        // Limit stored searches to 5
        if (recentSearches.length > 5) {
            recentSearches.pop();
        }
    }

    function showRecent() {
        outputDiv.innerHTML = "";  // Clear previous output

        recentSearches.forEach(item => {
            const resultHTML = `
                <div class="weather-result">
                    <h2>${item.name}</h2>
                    <p><strong>Temp:</strong> ${item.temp}°C</p>
                    <p><strong>Condition:</strong> ${item.desc}</p>
                </div>
            `;
            outputDiv.innerHTML += resultHTML;
        });
    }

    function showError(message) {
        outputDiv.innerHTML = `<p class="error">${message}</p>`;
    }
</script>

</body>
</html>
